name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        run: npm test

      - name: Privacy guard
        run: '! grep -RnE "fetch\(|XMLHttpRequest|sendBeacon|WebSocket|EventSource" web/js/ web/index.html'

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run tests
        run: python3 -m unittest discover -s scraper/tests
